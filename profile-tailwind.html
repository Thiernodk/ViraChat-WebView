    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentStatus = 'active';

            // Status management
            function setStatus(status) {
                // Reset all status buttons
                const buttons = {
                    'active': document.getElementById('statusActive'),
                    'busy': document.getElementById('statusBusy'),
                    'away': document.getElementById('statusAway')
                };

                Object.values(buttons).forEach(button => {
                    button.classList.remove('bg-white', 'shadow-sm', 'text-on-secondary-container', 'font-label-md');
                    button.classList.add('text-on-surface-variant', 'font-label-md', 'hover:bg-surface-variant/50', 'transition-all');
                });

                // Activate selected status
                const selectedButton = buttons[status];
                selectedButton.classList.remove('text-on-surface-variant', 'font-label-md', 'hover:bg-surface-variant/50', 'transition-all');
                selectedButton.classList.add('bg-white', 'shadow-sm', 'text-on-secondary-container', 'font-label-md');

                currentStatus = status;
                console.log(`Statut changé vers: ${status}`);
                
                // Update profile badge
                updateProfileBadge(status);
            }

            function updateProfileBadge(status) {
                const badge = document.querySelector('.bg-on-secondary-container');
                const innerDot = badge.querySelector('.bg-white');
                
                const colors = {
                    'active': 'bg-secondary',
                    'busy': 'bg-error',
                    'away': 'bg-slate-400'
                };

                innerDot.classList.remove('bg-secondary', 'bg-error', 'bg-slate-400');
                innerDot.classList.add(colors[status]);
            }

            // Action handlers
            function openPersonalInfo() {
                const personalInfo = {
                    name: 'Alexandre Dupont',
                    email: 'alexandre.dupont@opportun.com',
                    phone: '+33 6 12 34 56 78',
                    department: 'Marketing',
                    position: 'Lead Brand Strategist',
                    location: 'Paris, France'
                };

                const info = `
Informations Personnelles
=================
Nom: ${personalInfo.name}
Email: ${personalInfo.email}
Téléphone: ${personalInfo.phone}
Département: ${personalInfo.department}
Poste: ${personalInfo.position}
Localisation: ${personalInfo.location}

Options:
1. Modifier le nom
2. Modifier l'email
3. Modifier le téléphone
4. Modifier le département
5. Modifier le poste
6. Modifier la localisation
7. Changer l'avatar
                `;

                const choice = prompt(info + '\n\nEntrez le numéro de l\'option que vous souhaitez modifier:');
                
                if (choice && choice >= '1' && choice <= '7') {
                    const options = ['nom', 'email', 'téléphone', 'département', 'poste', 'localisation', 'avatar'];
                    const selectedOption = options[parseInt(choice) - 1];
                    
                    const newValue = prompt(`Nouveau ${selectedOption}:`);
                    if (newValue) {
                        console.log(`${selectedOption} modifié: ${newValue}`);
                        alert(`${selectedOption.charAt(0).toUpperCase() + selectedOption.slice(1)} modifié avec succès!`);
                    }
                }
            }

            function openSecurity() {
                const securityOptions = [
                    'Changer le mot de passe',
                    'Activer l\'authentification à deux facteurs',
                    'Voir les appareils connectés',
                    'Gérer les sessions actives',
                    'Configurer les notifications de sécurité',
                    'Historique des connexions'
                ];

                const choice = prompt(`Options de Sécurité:\n${securityOptions.map((opt, i) => `${i + 1}. ${opt}`).join('\n')}`);
                
                if (choice && choice >= '1' && choice <= securityOptions.length) {
                    const selectedOption = securityOptions[parseInt(choice) - 1];
                    console.log(`Option sécurité: ${selectedOption}`);
                    
                    if (choice === '1') {
                        const currentPassword = '********';
                        const newPassword = prompt(`Mot de passe actuel: ${currentPassword}\nNouveau mot de passe:`);
                        if (newPassword && newPassword.length >= 8) {
                            alert('Mot de passe changé avec succès!');
                        } else {
                            alert('Le mot de passe doit contenir au moins 8 caractères.');
                        }
                    } else if (choice === '2') {
                        alert('2FA activé! Veuillez scanner le code QR depuis votre application mobile.');
                    } else {
                        alert(`${selectedOption} - Fonctionnalité en développement`);
                    }
                }
            }

            function openStats() {
                const stats = {
                    meetingsCompleted: 24,
                    focusScore: 98,
                    messagesSent: 1247,
                    filesShared: 89,
                    callsMade: 156,
                    screenTime: '342h',
                    lastLogin: new Date().toLocaleString('fr-FR'),
                    productivityScore: 92
                };

                const statsInfo = `
Statistiques d'Activité
=================
Réunions terminées: ${stats.meetingsCompleted}
Score de concentration: ${stats.focusScore}%
Messages envoyés: ${stats.messagesSent}
Fichiers partagés: ${stats.filesShared}
Appels effectués: ${stats.callsMade}
Temps d'écran: ${stats.screenTime}
Dernière connexion: ${stats.lastLogin}
Score de productivité: ${stats.productivityScore}%
                `;

                alert(statsInfo);
            }

            function logout() {
                if (confirm('Êtes-vous sûr de vouloir vous déconnecter?')) {
                    console.log('Déconnexion en cours...');
                    
                    // Simulate logout process
                    const logoutOverlay = document.createElement('div');
                    logoutOverlay.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
                    logoutOverlay.innerHTML = `
                        <div class="bg-white rounded-xl p-8 max-w-sm mx-auto text-center">
                            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                <span class="material-symbols-outlined text-red-600 text-2xl" style="font-variation-settings: 'FILL' 1;">logout</span>
                            </div>
                            <h3 class="text-lg font-semibold text-slate-900 mb-2">Déconnexion...</h3>
                            <p class="text-slate-600">Veuillez patienter</p>
                        </div>
                    `;
                    
                    document.body.appendChild(logoutOverlay);
                    
                    // Simulate logout delay
                    setTimeout(() => {
                        logoutOverlay.remove();
                        alert('Déconnecté avec succès! Redirection vers la page de connexion...');
                        window.location.href = 'login-tailwind.html';
                    }, 2000);
                }
            }

            function showSearch() {
                const searchQuery = prompt('Rechercher dans le profil:');
                if (searchQuery) {
                    console.log(`Recherche: ${searchQuery}`);
                    // Implement profile search functionality
                }
            }

            // Add hover effects to action cards
            const actionCards = document.querySelectorAll('.bg-white.rounded-xl');
            actionCards.forEach(card => {
                card.addEventListener('mouseenter', () => {
                    card.style.transform = 'translateY(-2px)';
                    card.style.boxShadow = '0 8px 30px rgba(0,0,0,0.12)';
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'translateY(0)';
                    card.style.boxShadow = '';
                });
            });

            // Add ripple effect to buttons
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const ripple = document.createElement('span');
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    ripple.classList.add('ripple');
                    
                    this.style.position = 'relative';
                    this.style.overflow = 'hidden';
                    this.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                });
            });

            // Add ripple effect styles
            const style = document.createElement('style');
            style.textContent = `
                .ripple {
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.6);
                    transform: scale(0);
                    animation: ripple-animation 0.6s ease-out;
                    pointer-events: none;
                }
                
                @keyframes ripple-animation {
                    to {
                        transform: scale(4);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case '1':
                        setStatus('active');
                        break;
                    case '2':
                        setStatus('busy');
                        break;
                    case '3':
                        setStatus('away');
                        break;
                    case 'p':
                    case 'P':
                        openPersonalInfo();
                        break;
                    case 's':
                    case 'S':
                        openSecurity();
                        break;
                    case 't':
                    case 'T':
                        openStats();
                        break;
                    case 'l':
                    case 'L':
                        logout();
                        break;
                    case '/':
                        showSearch();
                        e.preventDefault();
                        break;
                }
            });

            // Simulate real-time status updates
            setInterval(() => {
                const statuses = ['active', 'busy', 'away'];
                const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
                
                if (Math.random() > 0.8) { // 20% chance to change status
                    setStatus(randomStatus);
                }
            }, 30000); // Check every 30 seconds

            // Simulate stats updates
            setInterval(() => {
                // Update meetings completed
                const meetingsElement = document.querySelector('.font-headline-md.text-on-secondary-container');
                if (meetingsElement) {
                    const currentCount = parseInt(meetingsElement.textContent);
                    const newCount = Math.max(1, currentCount + Math.floor(Math.random() * 3));
                    meetingsElement.textContent = newCount;
                }

                // Update focus score
                const focusElement = meetingsElement.nextElementSibling;
                if (focusElement) {
                    const currentScore = parseInt(focusElement.textContent);
                    const newScore = Math.max(85, Math.min(100, currentScore + Math.floor(Math.random() * 5) - 2));
                    focusElement.textContent = newScore + '%';
                }
            }, 45000); // Update every 45 seconds

            // Add haptic feedback for mobile
            function vibrate(pattern) {
                if ('vibrate' in navigator) {
                    navigator.vibrate(pattern);
                }
            }

            // Vibrate on button press (mobile)
            if ('vibrate' in navigator) {
                buttons.forEach(button => {
                    button.addEventListener('click', () => {
                        vibrate(50);
                    });
                }
            }

            // Initialize with current status
            setStatus(currentStatus);
        });
    </script>
</body>
</html>
