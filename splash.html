<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportun Messenger</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .splash-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            position: relative;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            margin-bottom: 2rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: var(--accent-green);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: var(--text-primary);
            box-shadow: var(--shadow-lg);
            animation: pulse 2s infinite;
        }

        .logo-text {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 1rem;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 0.5rem;
        }

        .loading-dots {
            display: flex;
            gap: 0.5rem;
            margin-top: 3rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 20% 80%, var(--accent-green) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--accent-green) 0%, transparent 50%);
        }

        .version-info {
            position: absolute;
            bottom: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .fade-in {
            animation: fadeIn 1s ease-out;
        }

        .slide-up {
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="splash-container">
            <div class="background-pattern"></div>
            
            <div class="logo-container fade-in">
                <div class="logo">
                    OM
                </div>
                <div class="logo-text slide-up">Opportun</div>
                <div class="logo-subtitle slide-up" style="animation-delay: 0.2s;">Messenger</div>
            </div>

            <div class="loading-dots slide-up" style="animation-delay: 0.4s;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="version-info">
                Version 1.0.0 • © 2026 Opportun
            </div>
        </div>
    </div>

    <script>
        // Auto-redirect to login after 3 seconds
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 3000);

        // Add interactive feedback
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.logo');
            logo.addEventListener('click', () => {
                logo.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    logo.style.transform = 'scale(1)';
                }, 200);
            });
        });
    </script>
</body>
</html>
